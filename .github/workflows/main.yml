name: Pokerank-api Deployment

on:
  push:
    branches:
      - main   

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'   

      - name: Install dependencies
        run: npm install
        working-directory: pokerank-api

      - name: Build project
        run: npm run build
        working-directory: pokerank-api

      - name: Start/Restart with PM2
        run: |
          npm install pm2 -g
          pm2 stop all || true
          pm2 start "npm run start:prod" --name pokerank-api
          pm2 save
        working-directory: pokerank-api
